    <path d="M276 264C276 233.072 301.072 208 332 208H356C410.124 208 454 251.876 454 306V322C454 385.513 402.513 437 339 437C304.206 437 276 408.794 276 374V264Z" stroke="#E1C487" stroke-width="16"/>
    <path d="M452 294H498C541.078 294 576 328.922 576 372V372C576 415.078 541.078 450 498 450H454" stroke="#C7A46A" stroke-width="16"/>
    <path d="M258 514H500" stroke="#E1C487" stroke-width="16" stroke-linecap="round"/>
