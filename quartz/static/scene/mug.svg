  <ellipse cx="50" cy="37" rx="12" ry="3" fill="rgba(255,236,196,0.14)" transform="rotate(-10,50,37)"/>
  <defs>
    <linearGradient id="mg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5E3C" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0E0806" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="mr" cx="40%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#C4956A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1A1008" stop-opacity="0.3"/>
