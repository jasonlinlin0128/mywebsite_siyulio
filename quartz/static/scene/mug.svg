  <!-- Coffee surface -->
  <ellipse cx="66" cy="40" rx="40" ry="8" fill="#4A2C14" opacity="0.9"/>
  <ellipse cx="60" cy="38" rx="16" ry="4" fill="rgba(200,140,80,0.2)" transform="rotate(-8,60,38)"/>
  <!-- Handle outer -->
