<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 160" fill="none">
  <!-- Cup body -->
  <path d="M18 40 L22 140 Q22 152 36 152 L96 152 Q110 152 110 140 L114 40 Z" fill="#2A1E14"/>
  <path d="M18 40 L22 140 Q22 152 36 152 L96 152 Q110 152 110 140 L114 40 Z" fill="url(#mg)"/>
  <!-- Rim ellipse -->
  <ellipse cx="66" cy="40" rx="48" ry="12" fill="#3A2A1C"/>
